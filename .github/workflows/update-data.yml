name: Update fixtures data

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch: {}
  push:
    paths:
      - "scraper/**"
      - ".github/workflows/update-data.yml"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape_fit.py

      - name: Commit data.json if changed
        run: |
          git config user.name "etc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No changes to data.json"
          else
            git add data.json
            git commit -m "Auto-update fixtures $(date -u '+%Y-%m-%d %H:%M UTC')"
            git fetch origin main
            git rebase origin/main
            git push
          fi
